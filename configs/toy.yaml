name: toy_tunnel_defects
task: semantic_segmentation

paths:
  images: examples/toy_dataset/images
  masks: examples/toy_dataset/masks

annotation:
  format: mask
  background_id: 0

classes:
  - id: 0
    name: background
    morphology: background
    color: [0, 0, 0]
  - id: 1
    name: crack
    morphology: linear
    color: [255, 0, 0]
  - id: 2
    name: leakage
    morphology: areal
    color: [0, 0, 255]

tiling:
  strategy: resolution_adaptive
  split_before_tiling: true
  merge: gaussian

evaluation:
  ignore_index: 255
  metrics:
    - miou
    - mdice
    - image_f1
    - boundary_f1
    - skeleton_f1
    - component_f1
