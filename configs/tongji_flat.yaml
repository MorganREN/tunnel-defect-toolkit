name: tongji
task: semantic_segmentation

paths:
  images: data/raw/tongji
  annotations: data/raw/tongji
  masks: data/raw/tongji/masks
  splits: data/raw/tongji/splits

annotation:
  format: labelme
  background_id: 0

classes:
  - id: 0
    name: background
    morphology: background
    color: [0, 0, 0]
  - id: 1
    name: crack
    aliases: [crack]
    morphology: linear
    color: [255, 0, 0]
  - id: 2
    name: leakage_b
    aliases: [leakageB]
    morphology: areal
    color: [0, 0, 255]
  - id: 3
    name: leakage_w
    aliases: [leakageW]
    morphology: areal
    color: [0, 255, 255]
  - id: 4
    name: leakage_g
    aliases: [leakageG]
    morphology: areal
    color: [0, 255, 0]
  - id: 5
    name: lining_falling_off
    aliases: [lining falling off]
    morphology: areal
    color: [255, 255, 0]
  - id: 6
    name: segment_damage
    aliases: [segment damage]
    morphology: areal
    color: [255, 0, 255]

tiling:
  strategy: resolution_adaptive
  split_before_tiling: true
  merge: gaussian

evaluation:
  ignore_index: 255
  metrics:
    - miou
    - mdice
    - image_f1
    - boundary_f1
    - skeleton_f1
    - component_f1
